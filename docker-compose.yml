version: '3.8'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - MONGODB_URI=mongodb://mongo:27017/nottutor
      - PORT=3000
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local
